<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My Cool Clock</title>
    <link rel="stylesheet" href="clock.css" />
  </head>
  <body>
    <div class="background"></div>
    <div class="clock">
      <div class="display">
        <div class="digit hour">00</div>
        <div class="divider">:</div>
        <div class="digit minute">00</div>
        <div class="divider">:</div>
        <div class="digit second">00</div>
      </div>
      <div class="day">Monday, January 1</div>
      <div class="settings">
        <label for="format">Format:</label>
        <select id="format">
          <option value="24" selected>24-hour</option>
          <option value="12">12-hour</option>
        </select>
        <label for="timezone">Timezone:</label>
        <select id="timezone">
          <option value="-1" selected>UTC -01:00</option>
        </select>
      </div>
    </div>
    <script src="clock.js"></script>
  </body>
</html>

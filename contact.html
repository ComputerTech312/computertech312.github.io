<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Me - My Improved Website</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <header>
        <nav>
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="contact.html">Contact Me</a></li>
            </ul>
        </nav>
    </header>
    <main>
        <h1>Contact Me</h1>
        <div class="contact-options">
            <div class="contact-option">
                <img src="email-icon.png" alt="Email Icon" class="contact-icon">
                <h2>Email</h2>
                <p>example@example.com</p>
            </div>
            <div class="contact-option">
                <img src="phone-icon.png" alt="Phone Icon" class="contact-icon">
                <h2>Phone</h2>
                <p>+1 (123) 456-7890</p>
            </div>
            <div class="contact-option">
                <img src="irc-icon.png" alt="IRC Icon" class="contact-icon">
                <h2>IRC</h2>
                <p>Server: irc.example.com</p>
                <p>Channel: #yourchannel</p>
            </div>
        </div>
    </main>
    <footer>
        <p>&copy; 2023 ComputerTech</p>
    </footer>

    <script src="scripts.js"></script>
</body>

</html>
